<!DOCTYPE html>
<html>
<head>
    <title>Online Quiz System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
            padding: 30px;
        }

        .quiz-container {
            background: white;
            width: 500px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h2 {
            color: #333;
        }

        button {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            margin-top: 15px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #218838;
        }

        #result {
            font-size: 20px;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h2>Online Quiz System</h2>

    <form id="quizForm">
        <p>1. What does HTML stand for?</p>
        <input type="radio" name="q1" value="a"> Hyper Text Markup Language<br>
        <input type="radio" name="q1" value="b"> High Text Machine Language<br>
        <input type="radio" name="q1" value="c"> Hyper Transfer Markup Language<br>

        <p>2. Which language is used for styling web pages?</p>
        <input type="radio" name="q2" value="a"> HTML<br>
        <input type="radio" name="q2" value="b"> CSS<br>
        <input type="radio" name="q2" value="c"> Java<br>

        <p>3. Which language is used for web page interactivity?</p>
        <input type="radio" name="q3" value="a"> Python<br>
        <input type="radio" name="q3" value="b"> Java<br>
        <input type="radio" name="q3" value="c"> JavaScript<br>

        <button type="button" onclick="checkQuiz()">Submit Quiz</button>
    </form>

    <div id="result"></div>
</div>

<script>
function checkQuiz() {
    let score = 0;

    let q1 = document.querySelector('input[name="q1"]:checked');
    let q2 = document.querySelector('input[name="q2"]:checked');
    let q3 = document.querySelector('input[name="q3"]:checked');

    if (q1 && q1.value === "a") score++;
    if (q2 && q2.value === "b") score++;
    if (q3 && q3.value === "c") score++;

    document.getElementById("result").innerHTML =
        "Your Score: " + score + " / 3";
}
</script>

</body>
</html>
